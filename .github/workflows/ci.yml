name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Newer pushes to the same ref cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit tests (JDK 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "25"
          cache: maven

      # Skips integration tests (those need Docker — see the integration job).
      - name: Build and unit-test
        run: mvn -B clean verify -DskipIntegrationTests=true

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: "**/target/site/jacoco/"
          if-no-files-found: warn

  integration:
    name: Integration tests (Testcontainers, JDK 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "25"
          cache: maven

      # GitHub-hosted Ubuntu runners ship Docker at the default socket, so
      # Testcontainers needs no DOCKER_HOST / socket override here (those are
      # only for local Colima — see scripts/local-env.sh).
      - name: Run integration tests
        run: mvn -B verify -pl integration-tests -am

  lint:
    name: Formatting (Spotless, JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Spotless' javac integration is incompatible with JDK 25, so the lint
      # profile runs on JDK 21. See the `lint` profile in the root pom.xml.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"
          cache: maven

      - name: Check formatting
        run: mvn -B -Plint spotless:check
