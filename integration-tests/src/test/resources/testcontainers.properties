# Docker host is intentionally NOT pinned here so the build stays portable.
#   - CI / Linux: Testcontainers auto-detects the default socket (/var/run/docker.sock).
#   - Local macOS + Colima: export DOCKER_HOST before running, e.g.
#       export DOCKER_HOST="unix://$HOME/.colima/default/docker.sock"
#     (see the project README "Docker setup" section).
testcontainers.reuse.enable=true
